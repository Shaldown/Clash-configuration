# Profile Enhancement Merge Template for Clash Verge

profile:
  store-selected: true

# Внимание: при добавлении тут групп, может поехать сортировка в группе All
proxy-groups:
  - name: Example
    type: select
    proxies:
      - Proxy
      - Без Proxy

rule-providers:
  local_example:
    type: file
    path: ./rule-sets/local/example.yaml
    behavior: classical
    format: yaml

rules:
  # Дополнения правил
  - RULE-SET,local_example,Без Proxy