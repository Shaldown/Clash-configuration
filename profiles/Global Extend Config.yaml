# Profile Enhancement Merge Template for Clash Verge

profile:
  store-selected: true

proxy-groups:
  - name: Без Proxy
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Bypass.png
    type: select
    hidden: true
    proxies:
      - DIRECT
  - name: Discord
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Discord.png
    type: select
    proxies:
      - Proxy
      - Без Proxy
  - name: YouTube
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/YouTube.png
    type: select
    proxies:
      - Proxy
      - Без Proxy
  - name: Games
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Game.png
    type: select
    proxies:
      - Proxy
      - Без Proxy

rule-providers:
  local_example:
    type: file
    path: ./rule-sets/local/example.yaml
    behavior: classical
    format: yaml
  category-ru:
