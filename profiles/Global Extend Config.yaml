    path: ./rule-sets/quic.yaml
    url: https://raw.githubusercontent.com/Shaldown/Clash-Verge-rev-configuration/refs/heads/main/rule-sets/quic.yaml
    behavior: classical
    format: yaml
    interval: 86400

rules:
  # Локальная сеть
  - RULE-SET,private-domains,DIRECT
  - RULE-SET,private-ips,DIRECT,no-resolve

  # Торренты
  - RULE-SET,torrent-clients,DIRECT
  - RULE-SET,torrent-trackers,DIRECT
  - PROCESS-NAME-REGEX,(?i).*torrent.*,DIRECT

  # Игры
  - RULE-SET,games,Games
  - RULE-SET,steam,Games
  - RULE-SET,epicgames,Games

  # Блокировка QUIC (для VLESS Reality)
  - RULE-SET,quic,REJECT

  # YouTube
  - RULE-SET,youtube,YouTube
  - PROCESS-NAME-REGEX,(?i).*youtube.*,YouTube

  # Twitch
  - RULE-SET,twitch-ads,Proxy
  - RULE-SET,twitch,Без Proxy

  # Discord
  - AND,((NETWORK,udp),(DST-PORT,19200-19500)),Discord
  - AND,((RULE-SET,discord_voiceips),(NETWORK,udp),(DST-PORT,50000-50100)),Discord
  - RULE-SET,discord_vc,Discord
  - RULE-SET,discord_domains,Discord
  - PROCESS-NAME-REGEX,(?i).*discord.*,Discord

  # Обновления и пуши
  - RULE-SET,google-play,Без Proxy
  - RULE-SET,apple,Без Proxy
  - RULE-SET,microsoft,Без Proxy

  # Блокировка реклама Pinteres
  - RULE-SET,pinterest,Без Proxy

  # СНГ сервисы
  - RULE-SET,category-ru,Без Proxy
  - RULE-SET,whitelist,Без Proxy
  - RULE-SET,ru-apps,Без Proxy
  - RULE-SET,direct-ips,Без Proxy,no-resolve

  - MATCH, Proxy
